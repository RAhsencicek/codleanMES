# =============================================================================
# Codlean MES — Arıza Tahmin Pipeline Konfigürasyon
# =============================================================================
# Kaynak: machinetypedataitems.csv + machinedataitems.csv (2026-03-05)
# Makine bazlı override yok (machinedataitems.csv boş) → tip bazlı limitler geçerli
# =============================================================================

kafka:
  bootstrap_servers: "10.71.120.10:7001"
  topic: "mqtt-topic-v2"
  group_id: "ariza-tahmin-pipeline"
  session_timeout_ms: 10000
  fetch_wait_max_ms: 500

pipeline:
  stale_data_threshold_seconds: 300
  startup_mask_minutes: 60
  state_window_size: 720              # 10sn aralıkla ~2 saat
  checkpoint_interval_seconds: 300
  alert_throttle_minutes: 30
  alert_throttle_critical_minutes: 15
  soft_limit_ratio: 0.85             # %85 = ORTA uyarı eşiği
  min_samples_for_trend: 30
  trend_r2_threshold: 0.70
  trend_eta_min_minutes: 5
  trend_eta_max_minutes: 480
  min_confidence_for_alert: 0.10
  spike_sigma_threshold: 5

ewma_alpha:
  HPR:
    oil_tank_temperature: 0.03      # Çok yavaş (sıcaklık stabil)
    main_pressure: 0.08             # Yumuşak geçiş (basınç dalgalanma filtrele)
    horizontal_press_pressure: 0.08 # Yumuşak geçiş
    lower_ejector_pressure: 0.06    # Orta-yavaş
    horitzonal_infeed_speed: 0.05   # Yavaş (hız stabil)
    vertical_infeed_speed: 0.05     # Yavaş
  IND:
    current: 0.08
    additional_current: 0.08
    estimated_part_temperature: 0.04
    power: 0.08
    power_percent: 0.08
  TST:
    saw_speed: 0.08
    servo_torque: 0.10
    main_motor_current: 0.08
    cut_time: 0.10
  default: 0.05  # Varsayılan yumuşak geçiş

# =============================================================================
# MAKİNE LİMİTLERİ — GERÇEK MÜHENDİSLİK DEĞERLERİ (CSV'den)
# =============================================================================
# Sadece is_violation_enabled=True olan sensörler buradadır.
# IND, RBT, CNC → is_violation_enabled yok → bu makinelerde sadece TREND izlenir.
# Tüm HPR makineleri aynı type limitlerini kullanır (Dikey veya Yatay Pres).
# =============================================================================

machine_limits:

  # ─── HPR (Dikey Pres - Type 003) ─────────────────────────────────────────
  # HPR001, HPR005 ve diğer tam donanımlı presler
  HPR001:
    oil_tank_temperature:  {min: 0.0,    max: 45.0,  unit: "°C"}
    main_pressure:         {min: 0.0,    max: 110.0, unit: "bar"}
    horizontal_press_pressure: {min: 0.0, max: 120.0, unit: "bar"}
    lower_ejector_pressure:    {min: 0.0, max: 110.0, unit: "bar"}
    horitzonal_infeed_speed:   {min: -300.0, max: 300.0, unit: "mm/sn"}
    vertical_infeed_speed:     {min: -300.0, max: 300.0, unit: "mm/sn"}

  HPR003:
    oil_tank_temperature:  {min: 0.0,    max: 45.0,  unit: "°C"}
    main_pressure:         {min: 0.0,    max: 110.0, unit: "bar"}
    horizontal_press_pressure: {min: 0.0, max: 120.0, unit: "bar"}
    lower_ejector_pressure:    {min: 0.0, max: 110.0, unit: "bar"}
    horitzonal_infeed_speed:   {min: -300.0, max: 300.0, unit: "mm/sn"}
    vertical_infeed_speed:     {min: -300.0, max: 300.0, unit: "mm/sn"}

  HPR004:
    oil_tank_temperature:  {min: 0.0,    max: 45.0,  unit: "°C"}
    main_pressure:         {min: 0.0,    max: 110.0, unit: "bar"}
    horizontal_press_pressure: {min: 0.0, max: 120.0, unit: "bar"}
    lower_ejector_pressure:    {min: 0.0, max: 110.0, unit: "bar"}
    horitzonal_infeed_speed:   {min: -300.0, max: 300.0, unit: "mm/sn"}
    vertical_infeed_speed:     {min: -300.0, max: 300.0, unit: "mm/sn"}

  HPR005:
    oil_tank_temperature:  {min: 0.0,    max: 45.0,  unit: "°C"}
    main_pressure:         {min: 0.0,    max: 110.0, unit: "bar"}
    horizontal_press_pressure: {min: 0.0, max: 120.0, unit: "bar"}
    lower_ejector_pressure:    {min: 0.0, max: 110.0, unit: "bar"}
    horitzonal_infeed_speed:   {min: -300.0, max: 300.0, unit: "mm/sn"}
    vertical_infeed_speed:     {min: -300.0, max: 300.0, unit: "mm/sn"}

  # ─── HPR (Yatay Pres - Type 004) ─────────────────────────────────────────
  # HPR002, HPR006 — daha az sensörlü presler
  HPR002:
    horizontal_press_pressure: {min: 0.0, max: 120.0, unit: "bar"}
    horitzonal_infeed_speed:   {min: -300.0, max: 300.0, unit: "mm/sn"}

  HPR006:
    horizontal_press_pressure: {min: 0.0, max: 120.0, unit: "bar"}
    horitzonal_infeed_speed:   {min: -300.0, max: 300.0, unit: "mm/sn"}

  # ─── TST (Testere - Type 001) ─────────────────────────────────────────────
  TST001:
    saw_speed:          {min: 0.0, max: 90.0,  unit: "RPM"}
    servo_torque:       {min: 0.0, max: 50.0,  unit: "%"}
    main_motor_current: {min: 0.0, max: 23.0,  unit: "A"}
    cut_time:           {min: 0.0, max: 45.0,  unit: "sn"}

  TST002:
    saw_speed:          {min: 0.0, max: 90.0,  unit: "RPM"}
    servo_torque:       {min: 0.0, max: 50.0,  unit: "%"}
    main_motor_current: {min: 0.0, max: 23.0,  unit: "A"}
    cut_time:           {min: 0.0, max: 45.0,  unit: "sn"}

  TST003:
    saw_speed:          {min: 0.0, max: 90.0,  unit: "RPM"}
    servo_torque:       {min: 0.0, max: 50.0,  unit: "%"}
    main_motor_current: {min: 0.0, max: 23.0,  unit: "A"}
    cut_time:           {min: 0.0, max: 45.0,  unit: "sn"}

  TST004:
    saw_speed:          {min: 0.0, max: 90.0,  unit: "RPM"}
    servo_torque:       {min: 0.0, max: 50.0,  unit: "%"}
    main_motor_current: {min: 0.0, max: 23.0,  unit: "A"}
    cut_time:           {min: 0.0, max: 45.0,  unit: "sn"}

  # ─── IND, RBT, CNC → Limit yok, sadece TREND izlenir ────────────────────
  # Bu makineler için is_violation_enabled=True sensör tanımlı değil.
  # Threshold engine bu makineleri atlar. TrendDetector çalışmaya devam eder.

# =============================================================================
# BOOLEAN SENSÖR KURALLARI
# success_key: true  → TRUE değeri = "normal/iyi"
# success_key: false → FALSE değeri = "normal/iyi" (ör: dirty=FALSE = temiz)
# alert_after_minutes: Kaç dakika sürekli "kötü" durumda kalırsa uyar
# =============================================================================
boolean_rules:
  # Kirli filtreler (success_key=FALSE → FALSE=temiz=iyi)
  pressure_line_filter_1_dirty: {success_key: false, alert_after_minutes: 60}
  pressure_line_filter_2_dirty: {success_key: false, alert_after_minutes: 60}
  pressure_line_filter_3_dirty: {success_key: false, alert_after_minutes: 60}
  pressure_line_filter_4_dirty: {success_key: false, alert_after_minutes: 60}
  pressure_line_filter_5_dirty: {success_key: false, alert_after_minutes: 60}
  return_line_filter_1_dirty:   {success_key: false, alert_after_minutes: 60}
  return_line_filter_2_dirty:   {success_key: false, alert_after_minutes: 60}
  pilot_pump_filter_1_dirty:    {success_key: false, alert_after_minutes: 30}
  pilot_pump_filter_2_dirty:    {success_key: false, alert_after_minutes: 30}
  # Seviye ve tank (success_key=FALSE → FALSE=iyi)
  oil_tank_level_low:           {success_key: false, alert_after_minutes: 10}
  # Valf ve pompa (success_key=TRUE → TRUE=çalışıyor=iyi)
  pump_1_suction_valve_ok:      {success_key: true,  alert_after_minutes: 5}
  pump_2_suction_valve_ok:      {success_key: true,  alert_after_minutes: 5}
  pump_3_suction_valve_ok:      {success_key: true,  alert_after_minutes: 5}
  pump_4_suction_valve_ok:      {success_key: true,  alert_after_minutes: 5}
  pump_5_suction_valve_ok:      {success_key: true,  alert_after_minutes: 5}
  pilot_pump_active:            {success_key: true,  alert_after_minutes: 15}
